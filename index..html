<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpaceJam</title>
    <link rel="stylesheet" href="dist/style.css">
</head>
<body>

    <header>
        <h1>SpaceJam</h1>
        <nav>
            <a href="#">Home</a>
            <a href="#">Characters</a>
            <a href="#">About</a>
        </nav>
    </header>

    <section class="hero">
        <div class="hero-content">
        <h2>Space Jam</h2>
        <p>
            Michael Jordan teams upp with the Looney Tunes to play
            basketball against aliens.
        </p>
        <button>Watch Now</button>
    </div>
    </section>

    <section class="movies">
        <h2>Characters</h2>

        <div class="row">

        <div class="card">
            <img src="images/bugs.jpg" alt="Bugs Bunny">
            <p>Bugs Bunny</p>
            </div>

            <div class="card">
                <img src="images/jordan.jpg" alt="Michael Jordan">
                <p>Michael Jordan</p>
            </div>

            <div class="card">
                <img src="images/daffy.jpg" alt="Daffy Duck">
                <p>Daffy Duck</p>
            </div>

    </div>
    </section>

    <footer>
        <p>&copy; Space Jam 1996</p>
    </footer>
</body>
</html>
